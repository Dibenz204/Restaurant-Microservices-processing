spring:
  application:
    name: menu-service
  datasource:
    # Phải đồng bộ với biến môi trường đã khai báo ở docker-compose
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5433/menu_db}
    username: ${SPRING_DATASOURCE_USERNAME:user}
    password: ${MENU_DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
server:
  port: 8080