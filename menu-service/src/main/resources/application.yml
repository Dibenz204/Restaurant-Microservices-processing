  application:
    name: menu-service
  datasource:
    url: ${MENU_DB_URL:jdbc:postgresql://postgres-menu:5432/menu_db}
    username: ${MENU_DB_USERNAME:user}
    password: ${MENU_DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
server:
  port: 8080