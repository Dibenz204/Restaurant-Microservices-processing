  application:
    name: order-service
  datasource:
    url: ${ORDER_DB_URL:jdbc:postgresql://postgres-order:5432/order_db}
    username: ${ORDER_DB_USERNAME:user}
    password: ${ORDER_DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
server:
    port: 8080