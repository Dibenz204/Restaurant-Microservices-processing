# Sửa lại cho đúng với biến environment đã được tạo từ docker-compose:
debug: true

spring:
  application:
    name: order-service
  datasource:
    # 1. Đổi ORDER_DB_URL thành SPRING_DATASOURCE_URL
    # 2. Đổi URL mặc định từ 'postgres-order:5432' thành 'localhost:5434' để chạy local
#   # localhost 5434 đã được khai báo thông qua docker-compose

    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5434/order_db}

    # 3. Đổi ORDER_DB_USERNAME thành SPRING_DATASOURCE_USERNAME cho đồng bộ với Docker Compose
    username: ${SPRING_DATASOURCE_USERNAME:user}

    password: ${ORDER_DB_PASSWORD:SuperSecretOrderPass123!}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration

logging:
  level:
    org.flywaydb: DEBUG
    org.springframework.boot.autoconfigure.flyway: DEBUG

server:
  port: 8080