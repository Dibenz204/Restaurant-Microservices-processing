  application:
    name: auth-service
  datasource:
    url: ${AUTH_DB_URL:jdbc:postgresql://postgres-auth:5432/auth_db}
    username: ${AUTH_DB_USERNAME:user}
    password: ${AUTH_DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
server:
  port: 8080