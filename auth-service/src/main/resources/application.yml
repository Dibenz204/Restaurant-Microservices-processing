server:
  port: 8080

spring:
  application:
    name: auth-service
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5435/auth_db}
    username: ${SPRING_DATASOURCE_USERNAME:user}
    password: ${AUTH_DB_PASSWORD:SuperSecretAuthPass123!}

    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

jwt:
  secret: ${JWT_SECRET}        # key >= 256 bit, để trong .env
  access-token-expiry: 900000  # 15 phút (ms)
  refresh-token-expiry: 604800000