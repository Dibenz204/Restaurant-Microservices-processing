services:
  postgres-auth:
    image: postgres:15
    environment:
      POSTGRES_DB: ${AUTH_DB_NAME:-auth_db}
      POSTGRES_USER: ${AUTH_DB_USER:-user}
      POSTGRES_PASSWORD: ${AUTH_DB_PASSWORD}
    ports:
      - "${AUTH_DB_PORT:-5432}:5432"
    volumes:
      - postgres-auth-data:/var/lib/postgresql/data

  auth-service:
    build:
      context: .
      dockerfile: ./auth-service/Dockerfile
    ports:
      - "${AUTH_SERVICE_PORT:-8081}:8080"
    deploy:
      resources:
        limits:
          memory: 250M
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-auth:5432/${AUTH_DB_NAME:-auth_db}
      SPRING_DATASOURCE_USERNAME: ${AUTH_DB_USER:-user}
      SPRING_DATASOURCE_PASSWORD: ${AUTH_DB_PASSWORD}
      AUTH_DB_PASSWORD: ${AUTH_DB_PASSWORD}
    depends_on:
      - postgres-auth

  postgres-menu:
    image: postgres:15
    environment:
      POSTGRES_DB: ${MENU_DB_NAME:-menu_db}
      POSTGRES_USER: ${MENU_DB_USER:-user}
      POSTGRES_PASSWORD: ${MENU_DB_PASSWORD}
    ports:
      - "${MENU_DB_PORT:-5433}:5432"
    volumes:
      - postgres-menu-data:/var/lib/postgresql/data

  menu-service:
    build:
      context: .
      dockerfile: ./menu-service/Dockerfile
    ports:
      - "${MENU_SERVICE_PORT:-8082}:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-menu:5432/${MENU_DB_NAME:-menu_db}
      SPRING_DATASOURCE_USERNAME: ${MENU_DB_USER:-user}
      SPRING_DATASOURCE_PASSWORD: ${MENU_DB_PASSWORD}
      MENU_DB_PASSWORD: ${MENU_DB_PASSWORD}
    depends_on:
      - postgres-menu

  postgres-order:
    image: postgres:15
    environment:
      POSTGRES_DB: ${ORDER_DB_NAME:-order_db}
      POSTGRES_USER: ${ORDER_DB_USER:-user}
      POSTGRES_PASSWORD: ${ORDER_DB_PASSWORD}
    ports:
      - "${ORDER_DB_PORT:-5434}:5432"
    volumes:
      - postgres-order-data:/var/lib/postgresql/data

  order-service:
    build:
      context: .
      dockerfile: ./order-service/Dockerfile
    ports:
      - "${ORDER_SERVICE_PORT:-8083}:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-order:5432/${ORDER_DB_NAME:-order_db}
      SPRING_DATASOURCE_USERNAME: ${ORDER_DB_USER:-user}
      SPRING_DATASOURCE_PASSWORD: ${ORDER_DB_PASSWORD}
      ORDER_DB_PASSWORD: ${ORDER_DB_PASSWORD}
    depends_on:
      - postgres-order

volumes:
  postgres-auth-data:
  postgres-menu-data:
  postgres-order-data: